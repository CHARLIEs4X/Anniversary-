<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>For My Love ❤️</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: black;
    color: white;
    text-align: center;
    overflow: hidden;
}

#bg {
    position: fixed;
    width: 100%;
    height: 100%;
    background: url('photo.jpg') center/cover no-repeat;
    filter: blur(10px) brightness(0.4);
    z-index: -1;
}

/* Hearts */
.heart {
    position: fixed;
    color: pink;
    animation: floatUp 6s linear infinite;
}
@keyframes floatUp {
    from { transform: translateY(100vh); opacity:1; }
    to { transform: translateY(-10vh); opacity:0; }
}

/* Layout */
.screen { display: none; padding: 20px; }
.active { display: block; }

.box {
    background: rgba(0,0,0,0.65);
    padding: 20px;
    border-radius: 20px;
    max-width: 350px;
    margin: auto;
    box-shadow: 0 0 25px rgba(255,0,100,0.6);
}

/* Message */
#typed {
    white-space: pre-line;
    line-height: 1.6;
    text-align: left;
}

/* Puzzle */
#puzzle {
    width: 300px;
    height: 300px;
    margin: auto;
    display: grid;
    grid-template-columns: repeat(3,1fr);
    gap: 2px;
}

.tile {
    width: 100px;
    height: 100px;
    background-image: url('photo.jpg');
    background-size: 300px 300px;
    transition: 0.2s;
}
.tile:active { transform: scale(0.95); }
.empty { background: transparent; }

/* Buttons */
button {
    padding: 10px 20px;
    margin: 10px;
    border-radius: 20px;
    border: none;
    transition: 0.2s;
}
button:active { transform: scale(0.9); }

#yesBtn { background: #ff4d6d; color: white; }
#noBtn { position: absolute; }

/* Glow */
.glow {
    animation: glow 1s infinite alternate;
}
@keyframes glow {
    from { box-shadow: 0 0 10px #ff4d6d; }
    to { box-shadow: 0 0 30px #ff4d6d; }
}

/* Fireworks */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    pointer-events: none;
}
</style>
</head>

<body>

<div id="bg"></div>
<canvas id="fireworks"></canvas>

<audio id="music" loop>
<source src="music.mp3">
</audio>

<!-- ❤️ Floating hearts -->
<script>
setInterval(()=>{
    let h=document.createElement("div");
    h.className="heart";
    h.innerHTML="❤️";
    h.style.left=Math.random()*100+"vw";
    h.style.fontSize=(10+Math.random()*20)+"px";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),6000);
},400);
</script>

<!-- 🧩 PUZZLE -->
<div id="screen1" class="screen active">
<div class="box">
<h3>Solve this ❤️</h3>
<div id="puzzle"></div>
</div>
</div>

<!-- 💌 MESSAGE -->
<div id="screen2" class="screen">
<div class="box">
<p id="typed"></p>
<button onclick="goQ()">Continue ❤️</button>
</div>
</div>

<!-- ❓ QUESTION -->
<div id="screen3" class="screen">
<div class="box glow">
<p>
I already know my answer…<br><br>
but will you be mine<br>
for a long, long time? ❤️
</p>
<button id="yesBtn" onclick="yes()">YES ❤️</button>
<button id="noBtn">NO 😏</button>
</div>
</div>

<!-- 🎉 FINAL -->
<div id="screen4" class="screen">
<div class="box glow">
<h2>You chose me ❤️</h2>
<p>
And I’ll choose you every single day 🥺<br><br>
Happy 4 months my love 🫶💫
</p>
</div>
</div>

<script>
/* 🎵 MUSIC */
document.body.onclick=()=>music.play();

/* 🧩 PUZZLE (perfect 3x3) */
let tiles=[1,2,3,4,5,6,7,8,null];

function shuffle(){
    do{
        tiles.sort(()=>Math.random()-0.5);
    }while(!isSolvable());
}

function isSolvable(){
    let inv=0;
    for(let i=0;i<8;i++)
    for(let j=i+1;j<9;j++)
    if(tiles[i]&&tiles[j]&&tiles[i]>tiles[j]) inv++;
    return inv%2===0;
}

shuffle();

function draw(){
    puzzle.innerHTML="";
    tiles.forEach((n,i)=>{
        let d=document.createElement("div");
        d.className="tile";

        if(!n){
            d.classList.add("empty");
        } else {
            let x=(n-1)%3;
            let y=Math.floor((n-1)/3);
            d.style.backgroundPosition =
                (-x*100) + "px " + (-y*100) + "px";
        }

        d.onclick=()=>move(i);
        puzzle.appendChild(d);
    });
}

draw();

function move(i){
    let e=tiles.indexOf(null);
    let valid=[i-1,i+1,i-3,i+3];

    if(valid.includes(e)){
        [tiles[i],tiles[e]]=[tiles[e],tiles[i]];
        draw();

        if(done()){
            setTimeout(()=>{
                switchS(1,2);
                type();
            },400);
        }
    }
}

function done(){
    return tiles.every((v,i)=>v===i+1||i===8);
}

/* 💌 MESSAGE */
let msg = `Happy 4 Months, My Love ❤️

From the moment you came into my life,
everything started to feel a little brighter,
a little warmer, and a lot more meaningful.

These past 4 months with you
have been filled with laughter, love,
and memories I’ll cherish forever.

You’re not just my girlfriend,
you’re my happiness, my comfort,
and my favorite place to be.

No matter what happens,
I promise to stand by you,
to care for you, and to love you
more and more with every passing day.

This is just the beginning of us…
and I can’t wait for all the moments
we still have to create together.

I love you ❤️`;

let i=0;
function type(){
    if(i<msg.length){
        typed.innerHTML+=msg[i++];
        setTimeout(type,12);
    }
}

function goQ(){ switchS(2,3); }

/* 😏 NO escapes */
noBtn.onmouseover=noBtn.ontouchstart=()=>{
    noBtn.style.left=Math.random()*window.innerWidth+"px";
    noBtn.style.top=Math.random()*window.innerHeight+"px";
};

/* 🎉 YES */
function yes(){
    switchS(3,4);
    fireworks();
}

/* 🎆 FIREWORKS (fixed) */
function fireworks() {
    const canvas = document.getElementById("fireworks");
    const ctx = canvas.getContext("2d");
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let particles = [];

    function createFirework() {
        let x = Math.random() * canvas.width;
        let y = Math.random() * canvas.height / 2;

        for (let i = 0; i < 80; i++) {
            particles.push({
                x, y,
                angle: Math.random() * 2 * Math.PI,
                speed: Math.random() * 5 + 2,
                radius: Math.random() * 2 + 1,
                life: 100
            });
        }
    }

    function animate() {
        ctx.fillStyle = "rgba(0,0,0,0.2)";
        ctx.fillRect(0,0,canvas.width,canvas.height);

        particles.forEach((p, i) => {
            p.x += Math.cos(p.angle)*p.speed;
            p.y += Math.sin(p.angle)*p.speed;
            p.life--;

            ctx.beginPath();
            ctx.arc(p.x,p.y,p.radius,0,Math.PI*2);
            ctx.fillStyle = "white";
            ctx.fill();

            if(p.life<=0) particles.splice(i,1);
        });

        requestAnimationFrame(animate);
    }

    setInterval(createFirework,600);
    animate();
}

/* SWITCH */
function switchS(a,b){
    document.getElementById("screen"+a).classList.remove("active");
    document.getElementById("screen"+b).classList.add("active");
}
</script>

</body>
</html>
