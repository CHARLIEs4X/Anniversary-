<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>For My Love ❤️</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: black;
    color: white;
    text-align: center;
    overflow: hidden;
}

#bg {
    position: fixed;
    width: 100%;
    height: 100%;
    background: url('photo.jpg') center/cover no-repeat;
    filter: blur(8px) brightness(0.4);
    z-index: -1;
}

/* Hearts */
.heart {
    position: fixed;
    color: pink;
    animation: floatUp 6s linear infinite;
}
@keyframes floatUp {
    from { transform: translateY(100vh); }
    to { transform: translateY(-10vh); }
}

.screen { display: none; padding: 20px; }
.active { display: block; }

.box {
    background: rgba(0,0,0,0.6);
    padding: 20px;
    border-radius: 20px;
    max-width: 350px;
    margin: auto;
    box-shadow: 0 0 20px rgba(255,0,100,0.5);
}

/* 3x3 Puzzle */
#puzzle {
    width: 300px;
    height: 300px;
    margin: auto;
    display: grid;
    grid-template-columns: repeat(3,1fr);
    gap: 3px;
}

.tile {
    background-image: url('photo.jpg');
    background-size: 300px 300px;
    transition: 0.2s;
}
.tile:active { transform: scale(0.95); }
.empty { background: transparent; }

/* Buttons */
button {
    padding: 10px 20px;
    margin: 10px;
    border-radius: 20px;
    border: none;
}

#yesBtn { background: #ff4d6d; color: white; }
#noBtn { position: absolute; }

/* Fireworks */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    pointer-events: none;
}
</style>
</head>

<body>

<div id="bg"></div>
<canvas id="fireworks"></canvas>

<audio id="music" loop>
<source src="music.mp3">
</audio>

<!-- Floating hearts -->
<script>
setInterval(()=>{
    let h=document.createElement("div");
    h.className="heart";
    h.innerHTML="❤️";
    h.style.left=Math.random()*100+"vw";
    h.style.fontSize=(10+Math.random()*20)+"px";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),6000);
},400);
</script>

<!-- PUZZLE -->
<div id="screen1" class="screen active">
<div class="box">
<h3>Solve this ❤️</h3>
<div id="puzzle"></div>
</div>
</div>

<!-- MESSAGE -->
<div id="screen2" class="screen">
<div class="box">
<p id="typed"></p>
<button onclick="goQ()">Continue ❤️</button>
</div>
</div>

<!-- QUESTION -->
<div id="screen3" class="screen">
<div class="box">
<p>
I already know my answer…<br><br>
but will you be mine<br>
for a long, long time? ❤️
</p>
<button id="yesBtn" onclick="yes()">YES ❤️</button>
<button id="noBtn">NO 😏</button>
</div>
</div>

<!-- FINAL -->
<div id="screen4" class="screen">
<div class="box">
<h2>You chose me ❤️</h2>
<p>
Happy 4 months my love 🫶<br><br>
I’ll choose you every day 💫
</p>
</div>
</div>

<script>
/* MUSIC */
document.body.onclick=()=>music.play();

/* 3x3 PUZZLE */
let tiles=[1,2,3,4,5,6,7,8,null];

function shuffle(){
    do{
        tiles.sort(()=>Math.random()-0.5);
    }while(!solvable());
}
function solvable(){
    let inv=0;
    for(let i=0;i<8;i++)
    for(let j=i+1;j<9;j++)
    if(tiles[i]&&tiles[j]&&tiles[i]>tiles[j]) inv++;
    return inv%2===0;
}
shuffle();

function draw(){
    puzzle.innerHTML="";
    tiles.forEach((n,i)=>{
        let d=document.createElement("div");
        d.className="tile";
        if(!n)d.classList.add("empty");

        if(n){
            let x=(n-1)%3,y=Math.floor((n-1)/3);
            d.style.backgroundPosition=`${-x*100}px ${-y*100}px`;
        }

        d.onclick=()=>move(i);
        puzzle.appendChild(d);
    });
}
draw();

function move(i){
    let e=tiles.indexOf(null);
    let valid=[i-1,i+1,i-3,i+3];
    if(valid.includes(e)){
        [tiles[i],tiles[e]]=[tiles[e],tiles[i]];
        draw();
        if(done()){
            setTimeout(()=>{
                switchS(1,2);
                type();
            },400);
        }
    }
}

function done(){
    return tiles.every((v,i)=>v===i+1||i===8);
}

/* MESSAGE */
let msg=`Happy 4 Months, My Love ❤️

From the moment you came into my life,
everything started to feel a little brighter,
a little warmer, and a lot more meaningful.

These past 4 months with you
have been filled with laughter, love,
and memories I’ll cherish forever.

You’re my happiness, my comfort,
and my favorite place to be.

I love you ❤️`;

let i=0;
function type(){
    if(i<msg.length){
        typed.innerHTML+=msg[i++];
        setTimeout(type,15);
    }
}

function goQ(){ switchS(2,3); }

/* NO ESCAPE */
noBtn.onmouseover=noBtn.ontouchstart=()=>{
    noBtn.style.left=Math.random()*window.innerWidth+"px";
    noBtn.style.top=Math.random()*window.innerHeight+"px";
};

/* YES */
function yes(){
    switchS(3,4);
    fireworks();
}

/* FIREWORKS */
function fireworks(){
    let c=document.getElementById("fireworks");
    let ctx=c.getContext("2d");
    c.width=innerWidth;
    c.height=innerHeight;

    setInterval(()=>{
        let x=Math.random()*c.width;
        let y=Math.random()*c.height/2;

        for(let i=0;i<40;i++){
            let dx=(Math.random()-0.5)*5;
            let dy=(Math.random()-0.5)*5;

            let life=40;

            function anim(px,py){
                if(life--<=0)return;
                ctx.fillRect(px,py,2,2);
                requestAnimationFrame(()=>anim(px+dx,py+dy));
            }
            anim(x,y);
        }
    },400);
}

/* SWITCH */
function switchS(a,b){
    document.getElementById("screen"+a).classList.remove("active");
    document.getElementById("screen"+b).classList.add("active");
}
</script>

</body>
</html>
